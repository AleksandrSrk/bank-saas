version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: bank_postgres
    restart: always
    environment:
      POSTGRES_DB: bank_saas
      POSTGRES_USER: bank_user
      POSTGRES_PASSWORD: bank_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: bank_backend
    restart: always
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: >
      sh -c "sleep 5 && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bank_bot
    restart: always
    depends_on:
      - backend
    env_file:
      - .env
    volumes:
      - .:/app
    command: >
      sh -c "pip install -r requirements_bot.txt && python -m bot.telegram_bot"
volumes:
  postgres_data: